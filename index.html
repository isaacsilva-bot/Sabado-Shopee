<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVP Planejamento</title>
    <style>
        :root { 
            --orange: #ff6a00; 
            --dark-orange: #d45600; /* Escurecido para melhor leitura */
            --bg: #f5f7fa; 
            --text: #222; /* Texto mais escuro para contraste */
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            padding-top: 85px; /* Espaço para a barra no topo */
            color: var(--text); 
            -webkit-font-smoothing: antialiased; 
        }

        .container { padding: 15px; max-width: 600px; margin: auto; box-sizing: border-box; }

        /* Formulário */
        .search-box { 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            margin-bottom: 20px; 
        }
        
        input { 
            width: 100%; 
            padding: 16px; 
            border-radius: 12px; 
            border: 2px solid #ddd; 
            margin-bottom: 12px; 
            box-sizing: border-box; 
            font-size: 18px; /* Fonte maior para leitura */
            font-weight: bold;
            background: #fdfdfd; 
        }
        
        button { 
            width: 100%; 
            padding: 18px; 
            background: var(--orange); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: 900; 
            font-size: 18px; 
            cursor: pointer; 
            text-transform: uppercase; 
            box-shadow: 0 4px 12px rgba(255,106,0,0.3); 
        }

        /* Cards Profissionais */
        .card-entrega { 
            background: white; 
            padding: 20px; 
            margin-bottom: 15px; 
            border-radius: 18px; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.08); 
            border-left: 8px solid var(--orange); 
        }
        
        .rota-badge { 
            background: #222; 
            color: white; 
            padding: 6px 12px; 
            border-radius: 6px; 
            font-size: 14px; 
            font-weight: 800; 
            display: inline-block; 
            margin-bottom: 12px; 
        }
        
        .field-label { 
            font-size: 12px; 
            color: var(--dark-orange); 
            text-transform: uppercase; 
            font-weight: 800; 
            display: block; 
            margin-bottom: 2px;
        }
        
        .field-value { 
            font-size: 17px; 
            color: #000; 
            font-weight: 700; 
            margin-bottom: 15px; 
            display: block; 
            line-height: 1.3;
        }
        
        .ponto-nome { font-size: 20px; color: #000; font-weight: 900; }
        
        .btn-gps-link { 
            color: #0056b3; /* Cor padrão de link para melhor reconhecimento */
            text-decoration: underline; 
            font-weight: 800; 
            font-size: 16px; 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            margin-top: 10px; 
        }

        /* BARRA DE NAVEGAÇÃO NO TOPO */
        .tab-bar { 
            position: fixed; 
            top: 0; /* Movido para o topo */
            width: 100%; 
            background: white; 
            display: flex; 
            height: 80px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); 
            z-index: 1000; 
        }
        
        .tab-item { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            font-size: 14px; 
            color: #555; 
            cursor: pointer; 
            font-weight: 800; 
            transition: all 0.2s ease;
            text-align: center;
            padding: 5px;
            border-bottom: 4px solid transparent;
        }

        .tab-item i { 
            font-style: normal; 
            font-size: 24px; 
            margin-bottom: 2px; 
        }

        .tab-item.active { 
            background: #fff3eb;
            color: var(--orange); 
            border-bottom: 4px solid var(--orange);
        }

        .hidden { display: none; }
        .loader { text-align: center; padding: 40px; color: #222; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>

    <nav class="tab-bar">
        <div class="tab-item active" id="btnPlan" onclick="switchTab('plan')">
            <i>📅</i>
            <span>PLANEJAMENTO</span>
        </div>
        <div class="tab-item" id="btnFech" onclick="switchTab('fech')">
            <i>🏬</i>
            <span>FECHAMENTO</span>
        </div>
    </nav>

    <div id="aba-plan">
        <div class="container">
            <h2 style="text-align:center; font-size: 18px;">Planejamento de Sábado</h2>
            <div class="search-box">
                <input type="number" id="idMotorista1" placeholder="Digite seu ID...">
                <button onclick="buscarPlanejamento()">CONSULTAR PLANEJAMENTO</button>
            </div>
            <div id="resultadoPlan"></div>
        </div>
    </div>

    <div id="aba-fech" class="hidden">
        <div class="container">
            <h2 style="text-align:center; font-size: 18px;">Fechamento Shopee</h2>
            <div class="search-box">
                <input type="number" id="idMotorista2" placeholder="Digite seu ID...">
                <button onclick="buscarFechamentoSabado()">CONSULTAR FECHAMENTO</button>
            </div>
            <div id="resultadoFech"></div>
        </div>
    </div>

<script>
    function switchTab(tab) {
        document.getElementById('aba-plan').classList.toggle('hidden', tab !== 'plan');
        document.getElementById('aba-fech').classList.toggle('hidden', tab !== 'fech');
        document.getElementById('btnPlan').classList.toggle('active', tab === 'plan');
        document.getElementById('btnFech').classList.toggle('active', tab === 'fech');
        window.scrollTo(0,0);
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
        const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
        const headers = lines[0].split(regex).map(h => h.replace(/^"|"$/g, '').trim());
        return lines.slice(1).map(line => {
            const cols = line.split(regex).map(c => c.replace(/^"|"$/g, '').trim());
            let obj = {};
            headers.forEach((h, i) => obj[h] = cols[i] || "");
            return obj;
        });
    }

    async function buscarPlanejamento() {
        const id = document.getElementById('idMotorista1').value.trim();
        const resDiv = document.getElementById('resultadoPlan');
        const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTLptCJKIUDiCVR440Z6ZaJxzvRB1WJeCV36OJfnTQ2nBLECWjlZOqslbedcybCY-4cUQSDmNOCEx0U/pub?output=csv&gid=465492226";
        if (!id) return;
        resDiv.innerHTML = "<div class='loader'>Buscando dados...</div>";
        try {
            const resp = await fetch(url);
            const data = parseCSV(await resp.text());
            const filtrados = data.filter(row => row["ID do motorista"] === id);
            if (filtrados.length === 0) { resDiv.innerHTML = "<div class='card-entrega'>❌ ID não localizado.</div>"; return; }
            let html = "";
            filtrados.forEach(row => {
                const end = `${row["ENDEREÇO"]}, ${row["NUMERO"]} - ${row["BAIRRO"]}`;
                html += `<div class="card-entrega">
                    <div class="rota-badge">ROTA: ${row["ROTA"] || "SVP-SAB"}</div>
                    <span class="field-label">LOJA</span><span class="field-value ponto-nome">${row["Nome da Loja"]}</span>
                    <span class="field-label">ENDEREÇO COMPLETO</span><span class="field-value">${end}</span>
                    <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(end)}" target="_blank" class="btn-gps-link">📍 ABRIR NO GOOGLE MAPS</a>
                </div>`;
            });
            resDiv.innerHTML = html;
        } catch (e) { resDiv.innerHTML = "Erro de conexão."; }
    }

    async function buscarFechamentoSabado() {
        const id = document.getElementById('idMotorista2').value.trim();
        const resDiv = document.getElementById('resultadoFech');
        const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTLptCJKIUDiCVR440Z6ZaJxzvRB1WJeCV36OJfnTQ2nBLECWjlZOqslbedcybCY-4cUQSDmNOCEx0U/pub?gid=1606207890&single=true&output=csv";
        if (!id) return;
        resDiv.innerHTML = "<div class='loader'>Buscando dados...</div>";
        try {
            const resp = await fetch(url);
            const data = parseCSV(await resp.text());
            const filtrados = data.filter(row => row["ID do motorista"] === id);
            if (filtrados.length === 0) { resDiv.innerHTML = "<div class='card-entrega'>❌ ID não localizado.</div>"; return; }
            let html = "";
            filtrados.forEach(row => {
                html += `<div class="card-entrega">
                    <div class="rota-badge">ROTA: ${row["ROTA"] || "FECH"}</div>
                    <span class="field-label">PONTO / AGÊNCIA</span><span class="field-value ponto-nome">${row["Loja / Ponto de Coleta"]}</span>
                    <div style="display:flex; gap:10px;">
                        <div style="flex:1;"><span class="field-label">VISITA</span><span class="field-value">${row["Horário de Visita Programado"] || "---"}</span></div>
                        <div style="flex:1;"><span class="field-label">FECHA ÀS</span><span class="field-value">${row["Horário de Funcionamento até"] || "---"}</span></div>
                    </div>
                    <span class="field-label">ENDEREÇO</span><span class="field-value">${row["Endereço Completo"]}</span>
                    <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(row["Endereço Completo"])}" target="_blank" class="btn-gps-link">📍 ABRIR NO GOOGLE MAPS</a>
                    <div style="background:#fff5ed; color:var(--dark-orange); padding:15px; border-radius:10px; text-align:center; font-weight:900; border:2px dashed var(--orange); margin-top:10px; font-size:18px;">Pacotes: ${row["Pacotes Coletados"] || "---"}</div>
                </div>`;
            });
            resDiv.innerHTML = html;
        } catch (e) { resDiv.innerHTML = "Erro de conexão."; }
    }
</script>
</body>
</html>
