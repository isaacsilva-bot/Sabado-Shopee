<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVP PLANEJAMENTO</title>
    <style>
        :root { --laranja: #ff6a00; --cinza: #f4f4f4; }
        
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background: var(--cinza); padding-bottom: 90px; }

        /* Estilo para preenchimento total de um canto ao outro */
        .header-banner {
            width: 100%;
            display: block;
            margin: 0;
            padding: 0;
        }

        .header-banner img {
            width: 100%;
            height: auto;
            display: block; /* Remove o espaço branco abaixo da imagem */
            object-fit: cover; /* Garante que a imagem cubra o espaço sem distorcer */
        }

        header { 
            background: var(--laranja); 
            color: white; 
            padding: 15px; 
            text-align: center; 
            font-size: 1.1rem; 
            font-weight: bold; 
            margin-top: 0;
        }

        .container { padding: 15px; max-width: 600px; margin: auto; }

        /* Estilização dos Inputs e Botões */
        input { 
            width: 100%; 
            padding: 15px; 
            border-radius: 8px; 
            border: 1px solid #ccc; 
            margin-bottom: 15px; 
            font-size: 16px; 
            box-sizing: border-box; 
            background: #fff;
        }

        button { 
            width: 100%; 
            padding: 15px; 
            background: var(--laranja); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 16px; 
            cursor: pointer;
        }

        /* Resultados */
        .card { 
            background: white; 
            padding: 15px; 
            border-radius: 10px; 
            margin-top: 10px; 
            border-left: 6px solid var(--laranja); 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            background: white; 
            margin-top: 10px; 
            border-radius: 8px; 
            overflow: hidden; 
        }

        th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; font-size: 13px; }
        th { background: #f8f8f8; }

        /* Barra de Navegação */
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 75px; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 12px; color: #666; cursor: pointer; font-weight: bold; }
        .tab-item span { font-size: 20px; margin-bottom: 2px; }
        .tab-item.active { color: var(--laranja); background: #fff5ed; border-top: 3px solid var(--laranja); }

        .hidden { display: none; }
        .btn-gps { background: var(--laranja); color: white; padding: 6px 10px; border-radius: 4px; text-decoration: none; font-size: 11px; }
    </style>
</head>
<body>

    <div id="aba-plan">
        <div class="header-banner">
            <img src="logo.png" alt="Cabeçalho Planejamento">
        </div>
        <header>Planejamento Completo de Sábado</header>
        <div class="container">
            <input type="text" id="id1" placeholder="Digite seu ID...">
            <button onclick="buscarFechamento()">Consultar meu ID</button>
            <div id="res1"></div>
        </div>
    </div>

    <div id="aba-fech" class="hidden">
        <div class="header-banner">
            <img src="empresa.jpg" alt="Cabeçalho Fechamentos">
        </div>
        <header>Horários de Fechamentos de Agencia/Ponto de Coleta</header>
        <div class="container">
            <input type="text" id="id2" placeholder="Digite seu ID...">
            <button onclick="buscarFechamento()">Consultar meu ID</button>
            <div id="res2"></div>
        </div>
    </div>

    <nav class="tab-bar">
        <div class="tab-item active" id="btn1" onclick="nav(1)"><span>📅</span>Planejamento</div>
        <div class="tab-item" id="btn2" onclick="nav(2)"><span>🏬</span>Fechamentos</div>
    </nav>

<script>
    function nav(n) {
        document.getElementById('aba-plan').classList.toggle('hidden', n !== 1);
        document.getElementById('aba-fech').classList.toggle('hidden', n !== 2);
        document.getElementById('btn1').classList.toggle('active', n === 1);
        document.getElementById('btn2').classList.toggle('active', n === 2);
        window.scrollTo(0,0);
    }

    const url1 = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTLptCJKIUDiCVR440Z6ZaJxzvRB1WJeCV36OJfnTQ2nBLECWjlZOqslbedcybCY-4cUQSDmNOCEx0U/pub?output=csv&gid=465492226";
    const url2 = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTLptCJKIUDiCVR440Z6ZaJxzvRB1WJeCV36OJfnTQ2nBLECWjlZOqslbedcybCY-4cUQSDmNOCEx0U/pub?gid=1606207890&single=true&output=csv";

    let banco1 = [];

    async function init() {
        try {
            const r = await fetch(url1);
            const t = await r.text();
            const linhas = t.split("\n").map(l => l.split(","));
            const headers = linhas[0].map(h => h.trim());
            banco1 = linhas.slice(1).map(l => {
                let o = {};
                headers.forEach((h, i) => o[h] = l[i] ? l[i].trim() : "");
                return o;
            });
        } catch(e) {}
    }

    document.getElementById('id1').addEventListener('input', function() {
        const id = this.value.trim();
        const res = document.getElementById('res1');
        const f = banco1.filter(d => d["ID do motorista"] === id);
        if(!id || f.length === 0) { res.innerHTML = ""; return; }
        let h = "<table><tr><th>Loja</th><th>Ação</th></tr>";
        f.forEach(r => {
            const local = encodeURIComponent(`${r["ENDEREÇO"]}, ${r["NUMERO"]}`);
            h += `<tr><td>${r["Nome da Loja"]}</td><td><a href="https://www.google.com/maps/search/?api=1&query=${local}" target="_blank" class="btn-gps">MAPA</a></td></tr>`;
        });
        res.innerHTML = h + "</table>";
    });

    async function buscarFechamento() {
        const id = document.getElementById('id2').value.trim();
        const res = document.getElementById('res2');
        if(!id) return;
        res.innerHTML = "Buscando...";
        try {
            const r = await fetch(url2);
            const t = await r.text();
            const linhas = t.split("\n").map(l => l.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
            const head = linhas[0].map(h => h.replace(/"/g, '').trim());
            const idx = head.indexOf("ID do motorista");
            const f = linhas.filter(l => l[idx] && l[idx].trim() === id);
            if(f.length === 0) { res.innerHTML = "Não encontrado."; return; }
            let h = "";
            f.forEach(l => {
                h += `<div class="card"><b>Loja:</b> ${l[head.indexOf("Loja / Ponto de Coleta")]}<br><b>Pacotes:</b> ${l[head.indexOf("Pacotes Coletados")]}</div>`;
            });
            res.innerHTML = h;
        } catch(e) { res.innerHTML = "Erro."; }
    }

    init();
</script>
</body>
</html>
