<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚚 Planejamento de Coletas Shopee Sábado</title>
    <style>
        :root { 
            --orange: #ff6a00; 
            --dark-orange: #d45600; 
            --bg: #f5f7fa; 
            --text: #1a1a1a; 
            --green-bg: #d4edda;
            --green-border: #28a745;
            --green-text: #155724;
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            padding-top: 90px; 
            color: var(--text); 
            -webkit-font-smoothing: antialiased; 
        }

        .container { padding: 15px; max-width: 800px; margin: auto; box-sizing: border-box; }

        .tab-bar { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            background: white; 
            display: flex; 
            height: 80px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); 
            z-index: 1000; 
        }
        
        .tab-item { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            font-size: 11px; 
            color: #555; 
            cursor: pointer; 
            font-weight: 800; 
            border-bottom: 5px solid transparent;
            text-align: center;
            padding: 5px;
            text-transform: uppercase;
        }

        .tab-item i { font-style: normal; font-size: 24px; margin-bottom: 2px; }

        .tab-item.active { 
            background: #fff3eb;
            color: var(--orange); 
            border-bottom: 5px solid var(--orange);
        }

        .search-box { 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            margin-bottom: 15px;
        }
        
        input { 
            width: 100%; 
            padding: 16px; 
            border-radius: 12px; 
            border: 2px solid #ccc; 
            margin-bottom: 12px; 
            box-sizing: border-box; 
            font-size: 18px; 
            font-weight: bold;
        }
        
        button { 
            width: 100%; 
            padding: 18px; 
            background: var(--orange); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: 900; 
            font-size: 18px; 
            cursor: pointer; 
            text-transform: uppercase;
        }

        /* TABELA DE PLANEJAMENTO */
        .tabela-wrapper {
            width: 100%;
            overflow-x: auto;
            background: white;
            border-radius: 10px;
            margin-top: 10px;
        }

        .tabela-plan {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
            min-width: 400px;
        }

        .tabela-plan thead { background: #444; color: white; }

        .tabela-plan th, .tabela-plan td {
            padding: 10px 5px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .tabela-plan tr:nth-child(even) { background-color: #f9f9f9; }

        .seq-col { font-weight: 900; color: var(--orange); text-align: center; width: 30px; }
        .shop-name { font-weight: 800; color: #000; }

        /* CARDS DE FECHAMENTO */
        .card-entrega { 
            background: white; 
            padding: 20px; 
            margin-bottom: 15px; 
            border-radius: 18px; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.08); 
            border-left: 8px solid var(--orange); 
        }

        .info-card {
            background: var(--green-bg);
            border-left: 8px solid var(--green-border);
            padding: 20px;
            border-radius: 15px;
            margin: 15px 0 25px 0;
            text-align: center;
        }

        .info-card p { margin: 0; font-size: 14px; color: var(--green-text); font-weight: 800; }

        .rota-badge { background: #222; color: white; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 800; display: inline-block; margin-bottom: 10px; }
        .field-label { font-size: 11px; color: var(--dark-orange); text-transform: uppercase; font-weight: 800; display: block; }
        .field-value { font-size: 16px; color: #000; font-weight: 700; margin-bottom: 10px; display: block; }
        .ponto-nome { font-size: 18px; color: #000; font-weight: 900; }
        .btn-gps-link { color: #0056b3; font-weight: 800; text-decoration: underline; display: flex; align-items: center; gap: 5px; margin-top: 10px; }

        .hidden { display: none; }
        .loader { text-align: center; padding: 40px; font-weight: bold; }
    </style>
</head>
<body>

    <nav class="tab-bar">
        <div class="tab-item active" id="btnPlan" onclick="switchTab('plan')">
            <i>📅</i>
            <span>Planejamento</span>
        </div>
        <div class="tab-item" id="btnFech" onclick="switchTab('fech')">
            <i>🏬</i>
            <span>Horários</span>
        </div>
    </nav>

    <div id="aba-plan">
        <div class="container">
            <h2 style="text-align:center; font-size: 16px;">Planejamento de Coletas</h2>
            <div class="search-box">
                <input type="number" id="idMotorista1" placeholder="Digite seu ID">
                <button onclick="buscarPlanejamento()">Consultar Rota 🚛</button>
            </div>
            <div id="resultadoPlan"></div>
        </div>
    </div>

    <div id="aba-fech" class="hidden">
        <div class="container">
            <h2 style="text-align:center; font-size: 16px;">Fechamento de Agências</h2>
            <div class="search-box">
                <input type="number" id="idMotorista2" placeholder="Digite seu ID">
                <button onclick="buscarFechamentoSabado()">Consultar Horários 🏬</button>
            </div>
            <div class="info-card"><p>🟢 Visite o ponto no horário agendado.</p></div>
            <div id="resultadoFech"></div>
        </div>
    </div>

<script>
    function switchTab(tab) {
        document.getElementById('aba-plan').classList.toggle('hidden', tab !== 'plan');
        document.getElementById('aba-fech').classList.toggle('hidden', tab !== 'fech');
        document.getElementById('btnPlan').classList.toggle('active', tab === 'plan');
        document.getElementById('btnFech').classList.toggle('active', tab === 'fech');
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
        const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
        const headers = lines[0].split(regex).map(h => h.replace(/^"|"$/g, '').trim());
        return lines.slice(1).map(line => {
            const cols = line.split(regex).map(c => c.replace(/^"|"$/g, '').trim());
            let obj = {};
            headers.forEach((h, i) => obj[h] = cols[i] || "");
            return obj;
        });
    }

    async function buscarPlanejamento() {
        const id = document.getElementById('idMotorista1').value.trim();
        const resDiv = document.getElementById('resultadoPlan');
        const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTLptCJKIUDiCVR440Z6ZaJxzvRB1WJeCV36OJfnTQ2nBLECWjlZOqslbedcybCY-4cUQSDmNOCEx0U/pub?output=csv&gid=465492226";
        
        if (!id) return;
        resDiv.innerHTML = "<div class='loader'>Buscando...</div>";
        
        try {
            const resp = await fetch(url);
            const csvText = await resp.text();
            const data = parseCSV(csvText);
            const filtrados = data.filter(row => row["ID do motorista"] === id);
            
            if (filtrados.length === 0) {
                resDiv.innerHTML = "<div class='card-entrega'>❌ ID não encontrado.</div>";
                return;
            }
            
            let html = `
                <div class="tabela-wrapper">
                    <table class="tabela-plan">
                        <thead>
                            <tr>
                                <th>SEQ</th>
                                <th>SHOP_NAME</th>
                                <th>ENDEREÇO</th>
                                <th>MAPA</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            filtrados.forEach(row => {
                const endereco = (row["ENDEREÇO"] || "") + ", " + (row["NUMERO"] || "") + " - " + (row["BAIRRO"] || "");
                const linkMaps = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(endereco);
                
                html += `
                    <tr>
                        <td class="seq-col">${row["SEQUÊNCIA"] || row["Sequencia"] || ""}</td>
                        <td class="shop-name">${row["SHOP_NAME"] || row["Nome da Loja"] || ""}</td>
                        <td>${endereco}</td>
                        <td style="text-align:center"><a href="${linkMaps}" target="_blank">📍</a></td>
                    </tr>
                `;
            });

            html += `</tbody></table></div>`;
            resDiv.innerHTML = html;
        } catch (e) {
            console.error(e);
            resDiv.innerHTML = "<div class='card-entrega'>Erro ao carregar dados. Verifique sua conexão.</div>";
        }
    }

    async function buscarFechamentoSabado() {
        const id = document.getElementById('idMotorista2').value.trim();
        const resDiv = document.getElementById('resultadoFech');
        const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTLptCJKIUDiCVR440Z6ZaJxzvRB1WJeCV36OJfnTQ2nBLECWjlZOqslbedcybCY-4cUQSDmNOCEx0U/pub?gid=1606207890&single=true&output=csv";
        
        if (!id) return;
        resDiv.innerHTML = "<div class='loader'>Buscando...</div>";
        
        try {
            const resp = await fetch(url);
            const csvText = await resp.text();
            const data = parseCSV(csvText);
            const filtrados = data.filter(row => row["ID do motorista"] === id);
            
            if (filtrados.length === 0) {
                resDiv.innerHTML = "<div class='card-entrega'>❌ ID não localizado.</div>";
                return;
            }
            
            let html = "";
            filtrados.forEach(row => {
                const endFech = row["Endereço Completo"] || "";
                const linkMapsFech = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(endFech);
                
                html += `
                    <div class="card-entrega">
                        <div class="rota-badge">ROTA: ${row["ROTA"] || "FECH"}</div>
                        <span class="field-label">PONTO / AGÊNCIA</span>
                        <span class="field-value ponto-nome">${row["Loja / Ponto de Coleta"]}</span>
                        <div style="display:flex; gap:10px;">
                            <div style="flex:1;"><span class="field-label">VISITA</span><span class="field-value">${row["Horário de Visita Programado"] || "---"}</span></div>
                            <div style="flex:1;"><span class="field-label">FECHA ÀS</span><span class="field-value">${row["Horário de Funcionamento até"] || "---"}</span></div>
                        </div>
                        <span class="field-label">ENDEREÇO</span>
                        <span class="field-value" style="font-size:14px;">${endFech}</span>
                        <a href="${linkMapsFech}" target="_blank" class="btn-gps-link">📍 ABRIR MAPAS</a>
                    </div>`;
            });
            resDiv.innerHTML = html;
        } catch (e) {
            resDiv.innerHTML = "<div class='card-entrega'>Erro ao carregar dados.</div>";
        }
    }
</script>
</body>
</html>
