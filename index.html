<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVP Planejamento</title>
    <style>
        :root { --orange: #ff6a00; --dark-orange: #e65c00; --bg: #f5f7fa; --text: #333; }
        body { font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; margin: 0; background: var(--bg); padding-bottom: 110px; color: var(--text); -webkit-font-smoothing: antialiased; }
        
        /* Ajuste das Imagens */
        .banner-wrapper { width: 100%; background: white; display: flex; justify-content: center; overflow: hidden; }
        .banner-img { width: 100%; height: auto; display: block; object-fit: contain; }
        
        .page-title { background: var(--orange); color: white; padding: 15px; text-align: center; font-size: 16px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }

        .container { padding: 15px; max-width: 600px; margin: auto; box-sizing: border-box; }

        /* Formulário Único */
        .search-box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; margin-top: -10px; position: relative; z-index: 5; }
        input { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid #e0e0e0; margin-bottom: 12px; box-sizing: border-box; font-size: 16px; background: #fdfdfd; text-align: center; font-weight: bold; }
        button { width: 100%; padding: 16px; background: var(--orange); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 12px rgba(255,106,0,0.2); }

        /* Cards Profissionais */
        .card-entrega { background: white; padding: 20px; margin-bottom: 15px; border-radius: 18px; box-shadow: 0 6px 15px rgba(0,0,0,0.05); border-left: 8px solid var(--orange); }
        .rota-badge { background: #333; color: white; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 12px; }
        .field-label { font-size: 11px; color: var(--orange); text-transform: uppercase; font-weight: 800; display: block; }
        .field-value { font-size: 15px; color: #222; font-weight: 600; margin-bottom: 10px; display: block; }
        .ponto-nome { font-size: 17px; color: var(--dark-orange); font-weight: 800; }
        .btn-gps-link { color: var(--orange); text-decoration: none; font-weight: bold; font-size: 14px; display: flex; align-items: center; gap: 5px; margin-top: 5px; }

        /* Navegação Laranja */
        .tab-bar { position: fixed; bottom: 0; width: 100%; background: white; display: flex; height: 85px; box-shadow: 0 -5px 20px rgba(0,0,0,0.1); z-index: 100; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 14px; color: #777; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-item i { font-style: normal; font-size: 28px; margin-bottom: 2px; }
        .tab-item.active { background: var(--orange); color: white; }

        .hidden { display: none; }
        .loader { text-align: center; padding: 20px; color: #666; font-weight: bold; }
        .welcome-msg { text-align: center; color: #888; padding: 20px; font-style: italic; }
    </style>
</head>
<body>

    <div class="header-app" style="background:white; text-align:center; padding:10px;">
        <img src="logo.png" style="max-height:40px;" alt="SVP">
    </div>

    <div class="container" style="padding-bottom: 0;">
        <div class="search-box">
            <input type="text" id="idGlobal" placeholder="DIGITE SEU ID AQUI">
            <button onclick="buscarTudo()">Consultar meu ID</button>
        </div>
    </div>

    <div id="aba-plan">
        <div class="page-title">Planejamento Completo de Sábado</div>
        <div class="container">
            <div id="resultadoPlan">
                <div class="welcome-msg">Digite seu ID acima para ver o planejamento.</div>
            </div>
        </div>
    </div>

    <div id="aba-fech" class="hidden">
        <div class="banner-wrapper">
            <img src="empresa.jpg" class="banner-img" alt="Banner">
        </div>
        <div class="page-title">Fechamento de Agencia/Ponto</div>
        <div class="container">
            <div id="resultadoFech">
                <div class="welcome-msg">Digite seu ID acima para ver os fechamentos.</div>
            </div>
        </div>
    </div>

    <nav class="tab-bar">
        <div class="tab-item active" id="btnPlan" onclick="switchTab('plan')"><i>📅</i><span>Planejamento</span></div>
        <div class="tab-item" id="btnFech" onclick="switchTab('fech')"><i>🏬</i><span>Sábado</span></div>
    </nav>

<script>
    // URLs das Planilhas
    const urlPlan = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTLptCJKIUDiCVR440Z6ZaJxzvRB1WJeCV36OJfnTQ2nBLECWjlZOqslbedcybCY-4cUQSDmNOCEx0U/pub?output=csv&gid=465492226";
    const urlFech = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTLptCJKIUDiCVR440Z6ZaJxzvRB1WJeCV36OJfnTQ2nBLECWjlZOqslbedcybCY-4cUQSDmNOCEx0U/pub?gid=1606207890&single=true&output=csv";

    function switchTab(tab) {
        document.getElementById('aba-plan').classList.toggle('hidden', tab !== 'plan');
        document.getElementById('aba-fech').classList.toggle('hidden', tab !== 'fech');
        document.getElementById('btnPlan').classList.toggle('active', tab === 'plan');
        document.getElementById('btnFech').classList.toggle('active', tab === 'fech');
        window.scrollTo(0,0);
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
        if (lines.length === 0) return [];
        const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
        const headers = lines[0].split(regex).map(h => h.replace(/^"|"$/g, '').trim());
        return lines.slice(1).map(line => {
            const cols = line.split(regex).map(c => c.replace(/^"|"$/g, '').trim());
            let obj = {};
            headers.forEach((h, i) => obj[h] = cols[i] || "");
            return obj;
        });
    }

    // FUNÇÃO PRINCIPAL QUE BUSCA NAS DUAS ABAS AO MESMO TEMPO
    async function buscarTudo() {
        const id = document.getElementById('idGlobal').value.trim();
        if (!id) { alert("Por favor, digite um ID."); return; }

        const resPlan = document.getElementById('resultadoPlan');
        const resFech = document.getElementById('resultadoFech');

        resPlan.innerHTML = "<div class='loader'>Buscando Planejamento...</div>";
        resFech.innerHTML = "<div class='loader'>Buscando Fechamentos...</div>";

        try {
            // Busca os dados das duas planilhas simultaneamente
            const [resp1, resp2] = await Promise.all([fetch(urlPlan), fetch(urlFech)]);
            const dataPlan = parseCSV(await resp1.text());
            const dataFech = parseCSV(await resp2.text());

            // Filtra Planejamento (Aba 1)
            const fPlan = dataPlan.filter(row => row["ID do motorista"] === id);
            renderPlan(fPlan, resPlan);

            // Filtra Fechamento (Aba 2)
            const fFech = dataFech.filter(row => row["ID do motorista"] === id);
            renderFech(fFech, resFech);

        } catch (e) {
            resPlan.innerHTML = "Erro ao carregar dados.";
            resFech.innerHTML = "Erro ao carregar dados.";
        }
    }

    function renderPlan(dados, div) {
        if (dados.length === 0) { div.innerHTML = "<div class='card-entrega'>Nenhum planejamento para este ID.</div>"; return; }
        let html = `<div class="resumo-topo">${dados.length} Entregas no Planejamento</div>`;
        dados.forEach(row => {
            const end = `${row["ENDEREÇO"]}, ${row["NUMERO"]} - ${row["BAIRRO"]}`;
            html += `<div class="card-entrega">
                <div class="rota-badge">ROTA: ${row["ROTA"] || "SVP-SAB"}</div>
                <span class="field-label">LOJA</span><span class="field-value ponto-nome">${row["Nome da Loja"]}</span>
                <span class="field-label">ENDEREÇO COMPLETO</span><span class="field-value">${end}</span>
                <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(end)}" target="_blank" class="btn-gps-link">📍 ABRIR NO GPS</a>
            </div>`;
        });
        div.innerHTML = html;
    }

    function renderFech(dados, div) {
        if (dados.length === 0) { div.innerHTML = "<div class='card-entrega'>Nenhum fechamento para este ID.</div>"; return; }
        let html = `<div class="resumo-topo">${dados.length} Fechamentos no Roteiro</div>`;
        dados.forEach(row => {
            html += `<div class="card-entrega">
                <div class="rota-badge">ROTA: ${row["ROTA"] || "FECH"}</div>
                <span class="field-label">PONTO</span><span class="field-value ponto-nome">${row["Loja / Ponto de Coleta"]}</span>
                <div style="display:flex; gap:10px;"><div style="flex:1;"><span class="field-label">VISITA</span><span class="field-value">${row["Horário de Visita Programado"] || "---"}</span></div><div style="flex:1;"><span class="field-label">FECHA ÀS</span><span class="field-value">${row["Horário de Funcionamento até"] || "---"}</span></div></div>
                <span class="field-label" style="margin-top:10px;">ENDEREÇO</span><span class="field-value">${row["Endereço Completo"]}</span>
                <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(row["Endereço Completo"])}" target="_blank" class="btn-gps-link">📍 ABRIR NO GPS</a>
                <div style="background:#fff5ed; color:var(--dark-orange); padding:10px; border-radius:10px; text-align:center; font-weight:bold; border:1px dashed var(--orange); margin-top:10px;">Pacotes: ${row["Pacotes Coletados"] || "---"}</div>
            </div>`;
        });
        div.innerHTML = html;
    }
</script>
</body>
</html>
