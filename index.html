<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚚 Planejamento de Coletas Shopee Sábado</title>
    <style>
        :root { 
            --orange: #ff6a00; 
            --dark-orange: #d45600; 
            --bg: #f5f7fa; 
            --text: #1a1a1a; 
            --green-bg: #d4edda;
            --green-border: #28a745;
            --green-text: #155724;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            padding-top: 90px; 
            color: var(--text); 
            -webkit-font-smoothing: antialiased; 
        }

        .container { padding: 15px; max-width: 600px; margin: auto; box-sizing: border-box; }

        /* BARRA DE NAVEGAÇÃO */
        .tab-bar { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            background: white; 
            display: flex; 
            height: 80px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.15); 
            z-index: 1000; 
        }
        
        .tab-item { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            font-size: 11px; 
            color: #555; 
            cursor: pointer; 
            font-weight: 800; 
            border-bottom: 5px solid transparent;
            text-align: center;
            padding: 5px;
            transition: background 0.3s;
            text-transform: uppercase;
        }

        .tab-item i { font-style: normal; font-size: 24px; margin-bottom: 2px; }

        .tab-item.active { 
            background: #fff3eb;
            color: var(--orange); 
            border-bottom: 5px solid var(--orange);
        }

        /* CARDS E INFOS */
        .info-card {
            background: var(--green-bg);
            border-left: 8px solid var(--green-border);
            padding: 15px;
            border-radius: 15px;
            margin: 10px 0 20px 0;
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.15);
            animation: float-subtle 3s ease-in-out infinite;
        }

        .info-card p {
            margin: 0;
            font-size: 14px;
            color: var(--green-text);
            line-height: 1.4;
            font-weight: 700;
            text-align: center;
        }

        @keyframes float-subtle {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
        }

        .search-box { 
            background: white; 
            padding: 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            margin-bottom: 15px;
        }
        
        input { 
            width: 100%; 
            padding: 16px; 
            border-radius: 12px; 
            border: 2px solid #ccc; 
            margin-bottom: 12px; 
            box-sizing: border-box; 
            font-size: 18px; 
            font-weight: bold;
            outline: none;
        }

        input:focus { border-color: var(--orange); }
        
        button { 
            width: 100%; 
            padding: 18px; 
            background: var(--orange); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-weight: 900; 
            font-size: 18px; 
            cursor: pointer; 
            text-transform: uppercase;
        }

        .card-entrega { 
            background: white; 
            padding: 20px; 
            margin-bottom: 15px; 
            border-radius: 18px; 
            box-shadow: 0 6px 15px rgba(0,0,0,0.08); 
            border-left: 8px solid var(--orange); 
        }
        
        .rota-badge { 
            background: #222; 
            color: white; 
            padding: 6px 12px; 
            border-radius: 6px; 
            font-size: 13px; 
            font-weight: 800; 
            display: inline-block; 
            margin-bottom: 12px; 
        }

        .field-label { font-size: 11px; color: var(--dark-orange); text-transform: uppercase; font-weight: 800; display: block; margin-top: 5px; }
        .field-value { font-size: 17px; color: #000; font-weight: 700; margin-bottom: 12px; display: block; }
        .ponto-nome { font-size: 20px; color: #000; font-weight: 900; }
        
        .btn-gps-link { 
            color: #0056b3; 
            font-weight: 800; 
            font-size: 15px; 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            margin-top: 15px; 
            text-decoration: none;
            background: #f0f7ff;
            padding: 10px;
            border-radius: 8px;
            justify-content: center;
        }

        .hidden { display: none; }
        .loader { text-align: center; padding: 40px; color: #222; font-weight: bold; font-size: 18px; }
        
        .pacotes-box {
            background: #fff5ed; 
            color: var(--dark-orange); 
            padding: 15px; 
            border-radius: 10px; 
            text-align: center; 
            font-weight: 900; 
            border: 2px dashed var(--orange); 
            margin-top: 10px; 
            font-size: 22px;
        }
    </style>
</head>
<body>

    <nav class="tab-bar">
        <div class="tab-item active" id="btnPlan" onclick="switchTab('plan')">
            <i>📅</i>
            <span>Planejamento Coletas</span>
        </div>
        <div class="tab-item" id="btnFech" onclick="switchTab('fech')">
            <i>🏬</i>
            <span>Horário Pontos</span>
        </div>
    </nav>

    <div id="aba-plan">
        <div class="container">
            <h2 style="text-align:center; font-size: 18px; margin-top: 0;">📦 Coletas do Sábado</h2>
            <div class="search-box">
                <input type="number" id="idMotorista1" placeholder="Digite seu ID">
                <button onclick="buscarPlanejamento()">Consultar Rota 🚛</button>
            </div>
            <div id="resultadoPlan"></div>
        </div>
    </div>

    <div id="aba-fech" class="hidden">
        <div class="container">
            <h2 style="text-align:center; font-size: 18px; margin-top: 0;">⏱️ Horário das Agências</h2>
            <div class="search-box">
                <input type="number" id="idMotorista2" placeholder="Digite seu ID">
                <button onclick="buscarFechamentoSabado()">Consultar Horários 🚛</button>
            </div>

            <div class="info-card">
                <p>🟢 IMPORTANTE: Visite o ponto no horário agendado para garantir que todos os pacotes sejam coletados.</p>
            </div>

            <div id="resultadoFech"></div>
        </div>
    </div>

<script>
    // Configurações da Planilha
    const SHEET_ID = "2PACX-1vTBIywxEqi7Hb5UHjqCAQBBZtVFs2ASYngPWDseAK8mrhm-8RyRJbxDLFGcSByeZ3dx6kyHiWrM007d";
    const URL_PLAN = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTLptCJKIUDiCVR440Z6ZaJxzvRB1WJeCV36OJfnTQ2nBLECWjlZOqslbedcybCY-4cUQSDmNOCEx0U/pubhtml?gid=465492226&single=true`;
    const URL_FECH = `https://docs.google.com/spreadsheets/d/e/2PACX-1vTLptCJKIUDiCVR440Z6ZaJxzvRB1WJeCV36OJfnTQ2nBLECWjlZOqslbedcybCY-4cUQSDmNOCEx0U/pubhtml?gid=950676577&single=true`;

    function switchTab(tab) {
        document.getElementById('aba-plan').classList.toggle('hidden', tab !== 'plan');
        document.getElementById('aba-fech').classList.toggle('hidden', tab !== 'fech');
        document.getElementById('btnPlan').classList.toggle('active', tab === 'plan');
        document.getElementById('btnFech').classList.toggle('active', tab === 'fech');
        window.scrollTo(0,0);
    }

    function parseCSV(text) {
        const lines = text.split(/\r?\n/).filter(line => line.trim() !== "");
        if (lines.length === 0) return [];
        const regex = /,(?=(?:(?:[^"]*"){2})*[^"]*$)/;
        const headers = lines[0].split(regex).map(h => h.replace(/^"|"$/g, '').trim());
        
        return lines.slice(1).map(line => {
            const cols = line.split(regex).map(c => c.replace(/^"|"$/g, '').trim());
            let obj = {};
            headers.forEach((h, i) => obj[h] = cols[i] || "");
            return obj;
        });
    }

    async function buscarPlanejamento() {
        const idInput = document.getElementById('idMotorista1').value.trim();
        const resDiv = document.getElementById('resultadoPlan');
        if (!idInput) return;

        resDiv.innerHTML = "<div class='loader'>Buscando dados...</div>";

        try {
            const resp = await fetch(`${URL_PLAN}&t=${new Date().getTime()}`);
            const text = await resp.text();
            const data = parseCSV(text);
            const filtrados = data.filter(row => String(row["ID do motorista"]).trim() === idInput);

            if (filtrados.length === 0) {
                resDiv.innerHTML = "<div class='card-entrega'>❌ ID não encontrado. Verifique se digitou corretamente ou se a planilha está publicada.</div>";
                return;
            }

            let html = "";
            filtrados.forEach(row => {
                const end = `${row["ENDEREÇO"] || ""}, ${row["NUMERO"] || ""} - ${row["BAIRRO"] || ""}`;
                const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(end)}`;
                
                html += `
                <div class="card-entrega">
                    <div class="rota-badge">ROTA: ${row["ROTA"] || "SVP"}</div>
                    <span class="field-label">LOJA</span>
                    <span class="field-value ponto-nome">${row["Nome da Loja"] || "N/A"}</span>
                    <span class="field-label">ENDEREÇO</span>
                    <span class="field-value">${end}</span>
                    <a href="${mapsUrl}" target="_blank" class="btn-gps-link">📍 ABRIR NO MAPS</a>
                </div>`;
            });
            resDiv.innerHTML = html;
        } catch (e) {
            resDiv.innerHTML = "<div class='card-entrega'>⚠️ Erro ao acessar a planilha. Verifique se ela está 'Publicada na Web'.</div>";
        }
    }

    async function buscarFechamentoSabado() {
        const idInput = document.getElementById('idMotorista2').value.trim();
        const resDiv = document.getElementById('resultadoFech');
        if (!idInput) return;

        resDiv.innerHTML = "<div class='loader'>Buscando horários...</div>";

        try {
            const resp = await fetch(`${URL_FECH}&t=${new Date().getTime()}`);
            const text = await resp.text();
            const data = parseCSV(text);
            const filtrados = data.filter(row => String(row["ID do motorista"]).trim() === idInput);

            if (filtrados.length === 0) {
                resDiv.innerHTML = "<div class='card-entrega'>❌ Nenhum ponto encontrado para este ID.</div>";
                return;
            }

            let html = "";
            filtrados.forEach(row => {
                const end = row["Endereço Completo"] || "";
                const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(end)}`;
                
                html += `
                <div class="card-entrega">
                    <div class="rota-badge">ROTA: ${row["ROTA"] || "FECH"}</div>
                    <span class="field-label">PONTO / AGÊNCIA</span>
                    <span class="field-value ponto-nome">${row["Loja / Ponto de Coleta"] || "N/A"}</span>
                    <div style="display:flex; gap:10px;">
                        <div style="flex:1;"><span class="field-label">VISITA</span><span class="field-value">${row["Horário de Visita Programado"] || "---"}</span></div>
                        <div style="flex:1;"><span class="field-label">FECHA ÀS</span><span class="field-value">${row["Horário de Funcionamento até"] || "---"}</span></div>
                    </div>
                    <span class="field-label">ENDEREÇO</span>
                    <span class="field-value" style="font-size:14px;">${end}</span>
                    <a href="${mapsUrl}" target="_blank" class="btn-gps-link">📍 ABRIR NO MAPS</a>
                    <div class="pacotes-box">
                        📦 Pacotes: ${row["Pacotes Coletados"] || "---"}
                    </div>
                </div>`;
            });
            resDiv.innerHTML = html;
        } catch (e) {
            resDiv.innerHTML = "<div class='card-entrega'>⚠️ Erro ao carregar horários.</div>";
        }
    }
</script>
</body>
</html>
